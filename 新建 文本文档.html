    <script>
        // 使用Canvas绘制一个简单的3D地球效果（带经纬网格和渐变）
        const canvas = document.getElementById('earthCanvas');
        const ctx = canvas.getContext('2d');
        let angle = 0;

        function drawEarth() {
            const w = canvas.width;
            const h = canvas.height;
            ctx.clearRect(0, 0, w, h);
            
            // 绘制外发光
            ctx.shadowBlur = 20;
            ctx.shadowColor = '#3B82F6';
            
            // 绘制地球主体（径向渐变）
            const gradient = ctx.createRadialGradient(w*0.35, h*0.35, 20, w*0.5, h*0.5, w*0.45);
            gradient.addColorStop(0, '#2a6f8f');
            gradient.addColorStop(0.5, '#1a4a6a');
            gradient.addColorStop(1, '#0a2a3a');
            ctx.beginPath();
            ctx.arc(w/2, h/2, w*0.42, 0, Math.PI*2);
            ctx.fillStyle = gradient;
            ctx.fill();
            
            // 绘制经纬网格（模拟3D旋转效果）
            ctx.strokeStyle = '#3B82F6';
            ctx.lineWidth = 1.5;
            ctx.shadowBlur = 5;
            
            // 经线（根据angle产生旋转感）
            for(let i = 0; i < 12; i++) {
                const lonAngle = (i * 30 + angle) * Math.PI / 180;
                const x1 = w/2 + Math.sin(lonAngle) * w*0.42;
                const y1 = h/2 + Math.cos(lonAngle) * w*0.18;
                const x2 = w/2 + Math.sin(lonAngle) * w*0.42;
                const y2 = h/2 - Math.cos(lonAngle) * w*0.18;
                ctx.beginPath();
                ctx.moveTo(x1, y1);
                ctx.lineTo(x2, y2);
                ctx.stroke();
            }
            
            // 纬线
            for(let i = 1; i <= 4; i++) {
                const latRadius = w*0.42 * Math.sin(i * 25 * Math.PI/180);
                const latY = h/2 - w*0.42 * Math.cos(i * 25 * Math.PI/180);
                ctx.beginPath();
                ctx.ellipse(w/2, latY, latRadius, latRadius*0.35, 0, 0, Math.PI*2);
                ctx.stroke();
            }
            
            // 绘制大陆轮廓点（装饰）
            ctx.fillStyle = '#A855F7';
            const continents = [[0.65,0.45], [0.35,0.55], [0.5,0.7], [0.7,0.6], [0.45,0.3]];
            continents.forEach(pos => {
                ctx.beginPath();
                ctx.arc(w*pos[0], h*pos[1], 3, 0, Math.PI*2);
                ctx.fillStyle = '#A855F7';
                ctx.fill();
            });
            
            ctx.shadowBlur = 0;
            angle += 1;
            requestAnimationFrame(drawEarth);
        }
        
        drawEarth();
    </script>
